<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>AI Resume Improver - Analyzer</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
  <h1>📄 AI Resume Improver</h1>

  <input type="file" id="fileInput" accept=".pdf" class="input-field">
  <br>

  <label for="jdInput">Paste Job Description (JD) here</label>
  <textarea id="jdInput" placeholder="Paste job description text..." style="width:100%;height:160px;margin-top:8px;"></textarea>

  <div class="btn-group">
    
    <button onclick="gapAnalyze()" class="primary-btn">🔎 ATS Gap Analyze (Resume vs JD)</button>
    <button onclick="goHome()" class="secondary">🏠 Back Home</button>
  </div>

  <div id="result" class="result-section"></div>
</div>

<script>
const API_URL = "http://127.0.0.1:8000";

// utility escape
function escapeHtml(text=''){ return (text||'').toString().replace(/[&<>"']/g, m=> ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m])); }

function showResult(message, type) {
  document.getElementById('result').innerHTML = `<div class="message ${type||'info'}">${escapeHtml(message)}</div>`;
}

async function gapAnalyze() {
  const file = document.getElementById("fileInput").files[0];
  const jd = document.getElementById("jdInput").value.trim();
  if (!jd) { showResult('Please paste the Job Description (JD) text before running gap analysis.', 'warning'); return; }
  if (!file) { showResult('Please upload a PDF resume to compare against the JD.', 'warning'); return; }

  showResult('Analyzing gap — uploading resume and JD...', 'loading');

  const form = new FormData();
  form.append('file', file);
  form.append('jd', jd);

  try {
    const res = await fetch(API_URL + '/api/resume/gap-analyze', { method: 'POST', body: form });
    const body = await res.json();
    if (!res.ok) {
      showResult('Server error: ' + (body.error || res.statusText), 'error');
      return;
    }
    displayGapResult(body.result);
  } catch (err) {
    showResult('Network error: ' + err.message, 'error');
  }
}

function displayGapResult(r) {
  const el = document.getElementById('result');
  const missing = (r.missingKeywords || []).slice(0,80);
  const matched = (r.matchedKeywords || []).slice(0,80);
  const sections = r.sections || [];
  const recommend = r.recommendations || [];

  el.innerHTML = `
    <div class="result-box">
      <div class="section">
        <h2>🔑 JD Keywords</h2>
        <div class="box">${escapeHtml((r.jdKeywords||[]).join(', ') || '—')}</div>
      </div>

      <div class="section">
        <h2>✅ Matched Keywords</h2>
        <div class="box">${escapeHtml(matched.join(', ') || 'None matched')}</div>
      </div>

      <div class="section">
        <h2>❗ Missing Keywords</h2>
        <div class="box">${escapeHtml(missing.join(', ') || 'No missing keywords detected')}</div>
      </div>

      <div class="section">
        <h2>📍 Section analysis</h2>
        ${sections.map(s=>`
          <div style="margin-bottom:12px;">
            <strong>${escapeHtml(s.title)}</strong>
            <div>Score: ${s.score} ${s.weak ? '<span style="color:#d32f2f"> (weak)</span>' : ''}</div>
            <div>Matched keywords: ${escapeHtml((s.keywordsFound||[]).join(', ')||'—')}</div>
            <div>Suggestions: ${escapeHtml((s.suggestions||[]).join(' ')||'—')}</div>
          </div>
        `).join('')}
      </div>

      <div class="section">
        <h2>💡 Recommendations</h2>
        <div class="box">${escapeHtml(recommend.join(' ') || 'No recommendations')}</div>
      </div>
    </div>
  `;
}

// Retain existing analyzeResume function (uploadFile) if present. keep goHome:
function goHome(){ window.location.href = 'index.html'; }

</script>
</body>
</html>
